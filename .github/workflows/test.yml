# Runs the automated test suite. The end-to-end tests exercise the built
# site (_site/) in headless Chromium, including verifying that audio is
# actually produced; see e2e/fixtures/audio.js for how.
name: Tests

on:
  push:
    branches: ["main"]

  pull_request:

  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  e2e-web:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: Initialize site
        run: make init
      - name: Build site
        run: make html
        env:
          JEKYLL_ENV: production

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - name: Install npm dependencies
        run: npm ci

      # The browser binaries are cached keyed on the lockfile (which pins
      # the Playwright version); the OS packages they need are not part of
      # the cached directory, so install-deps runs either way.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.browser }}

      # Firefox only renders Web Audio when an audio server is available,
      # and the runners have none, which makes the tests' signal-energy
      # (RMS) assertions see silence. PulseAudio with no hardware provides
      # a dummy sink, which is enough for Firefox's rendering clock to run.
      # Chromium renders against its own null device and does not need it.
      - name: Start PulseAudio
        if: matrix.browser == 'firefox'
        run: |
          sudo apt-get update
          sudo apt-get install -y pulseaudio
          pulseaudio --daemonize --exit-idle-time=-1

      - name: Run end-to-end tests
        run: npm run test:e2e -- --project=${{ matrix.browser }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7
