# Builds the Capacitor-based Android app. See docs/android.md for an
# overview of how the app and this workflow fit together.
#
# - Stable version tags: build a signed release APK and attach it to a
#   GitHub Release for the tag.
# - Development tags: build a signed APK and upload it as an artifact.
# - workflow_dispatch: build an unsigned debug APK.
# - Pull requests touching the Android build: build an unsigned debug
#   APK as a smoke test and upload it as a workflow artifact.
name: Android APK

on:
  push:
    tags: ["v*"]

  workflow_dispatch:

  pull_request:
    paths:
      - "_data/theme.json"
      - "android-resources/**"
      - "assets/images/cim_logo_512.png"
      - "patches/android/**"
      - "scripts/generate_android_project.sh"
      - "scripts/generate_android_resources.sh"
      - "scripts/tag_android_version.sh"
      - "tests/test_tag_android_version.sh"
      - "Makefile"
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.json"
      - ".github/workflows/android.yml"

permissions:
  # Needed to create the GitHub Release and upload the APK to it
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: Initialize site
        run: make init
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Test version tagging
        run: ./tests/test_tag_android_version.sh
      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install --yes imagemagick

      # Builds the site, generates the native project from the Capacitor
      # template, patches, and derived resources (android/ is not committed),
      # and copies _site into it.
      - name: Build site and Android project
        run: make android-assets
        env:
          JEKYLL_ENV: production

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # --- Pull requests and manual runs: unsigned debug APK ---
      - name: Build debug APK
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        run: cd android && ./gradlew assembleDebug
      - name: Upload debug APK
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: cim-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # --- Tags: signed APK ---
      - name: Decode keystore
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/cim-release.jks"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Compute version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: version
        run: |
          NAME="${GITHUB_REF_NAME#v}"
          CODE=$(./scripts/tag_android_version.sh --version-code "$NAME")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"

      - name: Build signed release APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd android && ./gradlew assembleRelease \
            -PcimVersionName='${{ steps.version.outputs.name }}' \
            -PcimVersionCode='${{ steps.version.outputs.code }}'
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/cim-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: cp android/app/build/outputs/apk/release/app-release.apk "cim-${GITHUB_REF_NAME}.apk"

      - name: Upload development APK artifact
        if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '.dev')
        uses: actions/upload-artifact@v4
        with:
          name: cim-development-apk
          path: cim-*.apk

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '.dev')
        uses: softprops/action-gh-release@v2
        with:
          files: cim-*.apk
          generate_release_notes: true
